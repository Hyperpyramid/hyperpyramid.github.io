<!DOCTYPE html>

    <title>Sunset Photography</title>
    <style>
        body { font-family: Georgia, serif; max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }
        .gallery img {
            width: 100%;
            height: 200px;
            object-fit: cover; /* Crops images to fit the square without stretching */
            border-radius: 8px;
            transition: transform 0.2s;
        }
        .gallery img:hover { transform: scale(1.05); }
    </style>
</head>
